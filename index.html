<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VilarNet</title>
    <meta name="theme-color" content="#1a1a2e">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JNN88E345T"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-JNN88E345T');
    </script>
</head>

<body>
    <div class="app-container">
        <div class="radio-glass">
            <header class="radio-header">
                <div class="logo-container">
                    <div class="logo-image">
                        <img src="img/logo_1.png" alt="Logo Radio FM">
                    </div>
                    <h1>VilarNet<span></span></h1>
                </div>
                <p class="frequency">FM</p>
            </header>

            <main class="radio-main">
                <div class="visualizer-container">
                    <div class="equalizer wave-eq" aria-hidden="true">
                        <div class="wave-row" style="--index: 0"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                        <div class="wave-row" style="--index: 1"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                        <div class="wave-row" style="--index: 2"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                        <div class="wave-row" style="--index: 3"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                        <div class="wave-row" style="--index: 4"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                        <div class="wave-row" style="--index: 5"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                        <div class="wave-row" style="--index: 6"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                        <div class="wave-row" style="--index: 7"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                        <div class="wave-row" style="--index: 8"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                        <div class="wave-row" style="--index: 9"><span class="wave-bar left"></span><span class="wave-core"></span><span class="wave-bar right"></span></div>
                    </div>
                </div>

                <div class="player-controls">
                    <div class="station-info">
                        <h2 class="station-name">Radio Vilardevoz</h2>
                        <p class="song-info" id="songInfo">Sábados de 9:30 a 14hs</p>
                    </div>

                    <div class="controls">
                        <button id="playBtn" class="control-btn play-btn">
                            <i class="fas fa-play"></i>
                        </button>
                        <div class="volume-control">
                            <i class="fas fa-volume-up" id="volumeIcon"></i>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                        </div>
                    </div>
                </div>
            </main>

            <footer class="radio-footer">
                <p class="status" id="statusText"><i class="fas fa-circle"></i> En línea</p>
                <p class="copyright">© <span id="currentYear"></span> Radio FM</p>
            </footer>
        </div>
    </div>

    <audio id="radioStream" crossorigin="anonymous" preload="none">
        <source src="https://icecast2.innovanexo.com:9000/radiocero.mp3" type="audio/mpeg">
        <p>Tu navegador no soporta el elemento de audio.</p>
    </audio>

    
    <script src="app.js"></script>
</body>

</html>
